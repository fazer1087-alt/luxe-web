<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>LUXE WEB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      border-bottom: 1px solid #222;
    }

    h1 {
      margin: 0;
      letter-spacing: 2px;
    }

    .btn {
      background: #fff;
      color: #000;
      padding: 10px 20px;
      border-radius: 12px;
      cursor: pointer;
      border: none;
    }

    .hero {
      text-align: center;
      padding: 100px 20px;
    }

    .hero h2 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .section {
      padding: 60px 20px;
      text-align: center;
    }

    .grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      margin-top: 30px;
    }

    .card {
      background: #111;
      padding: 20px;
      border-radius: 16px;
    }

    footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid #222;
      color: #777;
    }
  </style>
</head>

<body>

<header>
  <h1>LUXE WEB</h1>
  <button class="btn">Заказать</button>
</header>

<section class="hero">
  <h2>Премиальные сайты<br>для бизнеса</h2>
  <p>Создаём дизайн и сайты, которые продают</p>
  <br>
  <button class="btn">Начать проект</button>
</section>

<section class="section">
  <h2>Услуги</h2>
  <div class="grid">
    <div class="card">Лендинги</div>
    <div class="card">Интернет-магазины</div>
    <div class="card">UX/UI дизайн</div>
  </div>
</section>

<section class="section">
  <h2>Пакеты</h2>
  <div class="grid">
    <div class="card">Start — $500</div>
    <div class="card">Business — $1500</div>
    <div class="card">Premium — $5000+</div>
  </div>
</section>

<section class="section">
  <h2>Оставить заявку</h2>
  <input placeholder="Имя" style="padding:10px;margin:5px;">
  <input placeholder="Email" style="padding:10px;margin:5px;">
  <br><br>
  <button class="btn">Отправить</button>
</section>

<footer>
  © 2026 LUXE WEB
</footer>

</body>
</html>
